<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>LinkedIn Job Filter</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      width: 300px;
      padding: 14px;
      margin: 0;
      color: #1d1d1d;
    }

    /* ── Header row: title + toggle ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 15px;
      margin: 0;
    }

    /* ── Toggle switch ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #555;
      user-select: none;
    }

    .toggle-label {
      font-weight: 600;
      font-size: 12px;
      min-width: 34px;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 20px;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked+.slider {
      background: #0a66c2;
    }

    input:checked+.slider::before {
      transform: translateX(16px);
    }

    /* ── Disabled state dims the keyword section ── */
    #mainContent {
      transition: opacity 0.2s;
    }

    #mainContent.disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    p.hint {
      font-size: 12px;
      color: #666;
      margin: 0 0 10px;
    }

    .row {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 7px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }

    button#addBtn {
      padding: 7px 12px;
      border: none;
      background: #0a66c2;
      color: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    button#addBtn:hover {
      background: #004182;
    }

    ul#keywordList {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 220px;
      overflow-y: auto;
    }

    ul#keywordList li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      background: #f3f2ef;
      margin-bottom: 4px;
      border-radius: 4px;
      font-size: 13px;
    }

    .del-btn {
      background: transparent;
      border: none;
      color: #b00020;
      font-size: 16px;
      line-height: 1;
      padding: 0 4px;
      cursor: pointer;
    }

    #hiddenCount {
      font-size: 12px;
      color: #666;
      margin-top: 12px;
      border-top: 1px solid #eee;
      padding-top: 8px;
    }

    #emptyMsg {
      font-size: 12px;
      color: #999;
      padding: 4px 0;
    }
  </style>
</head>

<body>
  <div class="header">
    <h2>LinkedIn Job Filter</h2>
    <div class="toggle-wrap">
      <span class="toggle-label" id="toggleLabel">ON</span>
      <label class="switch" title="Enable / disable filtering">
        <input type="checkbox" id="enabledToggle" checked />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div id="mainContent">
    <p class="hint">Job posts containing any of these keywords will be hidden on LinkedIn search pages.</p>
    <div class="row">
      <input type="text" id="keywordInput" placeholder="e.g. Urgent, Mass Hiring" />
      <button id="addBtn">Add</button>
    </div>
    <ul id="keywordList"></ul>
    <div id="emptyMsg" style="display:none;">No keywords yet. Add one above.</div>
  </div>

  <div id="hiddenCount">Loading...</div>
  <script src="popup.js"></script>
</body>

</html>
